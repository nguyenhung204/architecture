# redis.conf - Cấu hình Redis tùy chỉnh

# Bind tới tất cả interface
bind 0.0.0.0

# Cổng mặc định
port 6379

# Đặt mật khẩu xác thực (thay đổi giá trị trong môi trường thực tế)
requirepass mysecretpassword

# Giới hạn bộ nhớ tối đa
maxmemory 256mb

# Chính sách xử lý khi đầy bộ nhớ: xóa key ít dùng nhất
maxmemory-policy allkeys-lru

# Tắt persistence (chỉ dùng in-memory)
save ""

# Cho phép kết nối ở chế độ protected mode thông qua password
protected-mode yes

# Ghi log ở mức notice
loglevel notice
