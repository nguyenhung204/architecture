services:
  mongodb:
    image: mongo:7.0
    container_name: monolithic-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: micro_services_db
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monolithic-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/micro_services_db?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - PORT=3000
    depends_on:
      - mongodb

volumes:
  mongo_data:
