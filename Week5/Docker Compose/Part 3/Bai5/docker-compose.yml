services:
  vote:
    image: dockersamples/examplevotingapp_vote
    container_name: p3-bai5-vote
    ports:
      - "5000:80"
    depends_on:
      - redis
    networks:
      - front-tier
      - back-tier

  result:
    image: dockersamples/examplevotingapp_result
    container_name: p3-bai5-result
    ports:
      - "5001:80"
    depends_on:
      - db
    networks:
      - front-tier
      - back-tier

  worker:
    image: dockersamples/examplevotingapp_worker
    container_name: p3-bai5-worker
    depends_on:
      - redis
      - db
    networks:
      - back-tier

  redis:
    image: redis:alpine
    container_name: p3-bai5-redis
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    container_name: p3-bai5-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - back-tier

volumes:
  db_data:

networks:
  front-tier:
  back-tier:
