services:
  redis:
    image: redis:7-alpine
    container_name: p3-bai8-redis
    ports:
      - "6379:6379"
    networks:
      - django-net

  web:
    build: ./django-app
    container_name: p3-bai8-django
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./django-app:/app
    networks:
      - django-net

  celery:
    build: ./django-app
    container_name: p3-bai8-celery
    command: celery -A myproject worker --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./django-app:/app
    networks:
      - django-net

networks:
  django-net:
