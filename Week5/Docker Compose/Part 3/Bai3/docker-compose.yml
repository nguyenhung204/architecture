services:
  flask1:
    build: ./flask-app
    container_name: p3-bai3-flask1
    networks:
      - lb-net

  flask2:
    build: ./flask-app
    container_name: p3-bai3-flask2
    networks:
      - lb-net

  nginx:
    image: nginx:alpine
    container_name: p3-bai3-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask1
      - flask2
    networks:
      - lb-net

networks:
  lb-net:
