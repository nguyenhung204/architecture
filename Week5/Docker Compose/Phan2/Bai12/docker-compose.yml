services:
  prometheus:
    image: prom/prometheus:latest
    container_name: bai12-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: bai12-grafana
    ports:
      - "3002:3000"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: bai12-node-exporter
